<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>TycoonUP — Design System</title>
  <link rel="stylesheet" href="shared/tokens.css"/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    body { font-family: var(--font-ui); }
    .ds-page { max-width: 1280px; margin: 0 auto; padding: 64px 48px 120px; }
    .ds-hero { display: flex; align-items: flex-end; justify-content: space-between; gap: 48px; margin-bottom: 64px; padding-bottom: 32px; border-bottom: 1px solid var(--stroke-hairline); }
    .ds-eyebrow { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 16px; }
    .ds-h1 { font-family: var(--font-display); font-weight: 700; font-size: 72px; line-height: 0.95; letter-spacing: -0.04em; color: var(--text-primary); margin: 0; }
    .ds-h1 .accent { background: linear-gradient(90deg, var(--neon-cyan), var(--neon-lime)); -webkit-background-clip: text; background-clip: text; color: transparent; }
    .ds-lede { font-size: 16px; color: var(--text-secondary); max-width: 420px; line-height: 1.6; margin-top: 24px; }
    .ds-meta { font-family: var(--font-mono); font-size: 12px; color: var(--text-muted); display: flex; flex-direction: column; gap: 6px; text-align: right; }
    .ds-meta b { color: var(--text-secondary); font-weight: 500; }
    .ds-section { margin: 72px 0; }
    .ds-section-head { display: flex; align-items: baseline; gap: 16px; margin-bottom: 24px; padding-bottom: 12px; border-bottom: 1px solid var(--stroke-hairline); }
    .ds-section-num { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); letter-spacing: 0.15em; }
    .ds-section-title { font-family: var(--font-display); font-size: 28px; font-weight: 600; letter-spacing: -0.02em; margin: 0; color: var(--text-primary); }
    .ds-section-sub { font-size: 13px; color: var(--text-muted); margin-left: auto; font-family: var(--font-mono); }
    .ds-grid { display: grid; gap: 12px; }
    .ds-swatch { border-radius: 10px; padding: 14px; display: flex; flex-direction: column; justify-content: space-between; min-height: 116px; border: 1px solid var(--stroke-hairline); position: relative; overflow: hidden; }
    .ds-swatch-name { font-family: var(--font-display); font-weight: 600; font-size: 13px; }
    .ds-swatch-val { font-family: var(--font-mono); font-size: 10.5px; opacity: 0.7; margin-top: 4px; letter-spacing: -0.01em; }
    .ds-card { background: var(--bg-glass); border: 1px solid var(--stroke-hairline); border-radius: 14px; padding: 24px; }
    .ds-label { font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 12px; }
    .type-row { display: flex; align-items: baseline; gap: 24px; padding: 14px 0; border-bottom: 1px dashed var(--stroke-hairline); }
    .type-row:last-child { border: none; }
    .type-spec { font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); white-space: nowrap; min-width: 160px; letter-spacing: 0.05em; text-transform: uppercase; }
    .spacing-block { background: var(--neon-cyan); height: 36px; border-radius: 3px; }
    .radius-block { background: var(--bg-raised); border: 1px solid var(--stroke-soft); width: 80px; height: 80px; display: flex; align-items: center; justify-content: center; font-family: var(--font-mono); font-size: 11px; color: var(--text-secondary); }
    .demo-block { background: var(--bg-glass); border: 1px dashed var(--stroke-soft); border-radius: 10px; padding: 24px; display: flex; align-items: center; justify-content: center; gap: 16px; flex-wrap: wrap; }
    .token-row { display: flex; gap: 18px; align-items: center; padding: 14px 18px; background: var(--bg-raised); border-radius: 10px; border: 1px solid var(--stroke-hairline); }
  </style>
</head>
<body class="tu-backdrop">
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel" src="shared/primitives.jsx"></script>
  <script type="text/babel" src="shared/components.jsx"></script>
  <script type="text/babel">
    const { useState } = React;

    const ColorSwatch = ({ name, token, dark, textColor }) => (
      <div className="ds-swatch" style={{ background: `var(${token})`, color: textColor || (dark ? 'oklch(0.12 0.02 260)' : 'var(--text-primary)') }}>
        <div style={{ display: 'flex', flexDirection: 'column', gap: 2 }}>
          <div className="ds-swatch-name">{name}</div>
          <div className="ds-swatch-val">{token}</div>
        </div>
      </div>
    );

    const App = () => (
      <div className="ds-page">
        {/* HERO */}
        <div className="ds-hero">
          <div>
            <div className="ds-eyebrow">Design system · v0.1 · Apr 2026</div>
            <h1 className="ds-h1">Tycoon<span className="accent">UP</span><br/>Neon Boardroom</h1>
            <p className="ds-lede">The visual language for a real-time, multiplayer property-trading game. Dark charcoal surfaces, four neon player identities, and a tactile, game-native type system.</p>
          </div>
          <div className="ds-meta">
            <div><b>Base grid</b> 4px</div>
            <div><b>Display</b> Space Grotesk</div>
            <div><b>Mono</b> JetBrains Mono</div>
            <div><b>Surfaces</b> oklch charcoal-navy</div>
            <div><b>Accents</b> 4 neon hues @ 0.17c</div>
          </div>
        </div>

        {/* 01 Color */}
        <section className="ds-section">
          <div className="ds-section-head">
            <span className="ds-section-num">01</span>
            <h2 className="ds-section-title">Color</h2>
            <span className="ds-section-sub">13 roles · oklch space</span>
          </div>

          <div className="ds-label">Surfaces — cool charcoal-navy</div>
          <div className="ds-grid" style={{ gridTemplateColumns: 'repeat(5, 1fr)', marginBottom: 32 }}>
            <ColorSwatch name="Abyss" token="--bg-abyss" />
            <ColorSwatch name="Base" token="--bg-base" />
            <ColorSwatch name="Raised" token="--bg-raised" />
            <ColorSwatch name="Tile" token="--bg-tile" />
            <ColorSwatch name="Tile hover" token="--bg-tile-hover" />
          </div>

          <div className="ds-label">Player identities — shared chroma (0.17–0.22), varied hue</div>
          <div className="ds-grid" style={{ gridTemplateColumns: 'repeat(4, 1fr)', marginBottom: 32 }}>
            <ColorSwatch name="Cyan" token="--neon-cyan" dark />
            <ColorSwatch name="Magenta" token="--neon-magenta" dark />
            <ColorSwatch name="Lime" token="--neon-lime" dark />
            <ColorSwatch name="Amber" token="--neon-amber" dark />
          </div>

          <div className="ds-label">Set groups — board color bands</div>
          <div className="ds-grid" style={{ gridTemplateColumns: 'repeat(6, 1fr)' }}>
            <ColorSwatch name="Americas" token="--set-americas" dark />
            <ColorSwatch name="Europe" token="--set-europe" dark />
            <ColorSwatch name="Asia" token="--set-asia" dark />
            <ColorSwatch name="Mideast" token="--set-mideast" dark />
            <ColorSwatch name="Africa" token="--set-africa" dark />
            <ColorSwatch name="Oceania" token="--set-oceania" dark />
          </div>
        </section>

        {/* 02 Type */}
        <section className="ds-section">
          <div className="ds-section-head">
            <span className="ds-section-num">02</span>
            <h2 className="ds-section-title">Typography</h2>
            <span className="ds-section-sub">Space Grotesk · JetBrains Mono</span>
          </div>

          <div className="ds-card">
            <div className="type-row">
              <span className="type-spec">Display · 72 / 0.95</span>
              <span style={{ fontFamily: 'var(--font-display)', fontWeight: 700, fontSize: 64, letterSpacing: '-0.04em', lineHeight: 1 }}>Build an empire.</span>
            </div>
            <div className="type-row">
              <span className="type-spec">H1 · 40 / 1.0</span>
              <span style={{ fontFamily: 'var(--font-display)', fontWeight: 600, fontSize: 40, letterSpacing: '-0.03em' }}>Lobby · room 3sv9w</span>
            </div>
            <div className="type-row">
              <span className="type-spec">H2 · 24 / 1.1</span>
              <span style={{ fontFamily: 'var(--font-display)', fontWeight: 600, fontSize: 24, letterSpacing: '-0.02em' }}>Property · Tokyo</span>
            </div>
            <div className="type-row">
              <span className="type-spec">Body · 14 / 1.55</span>
              <span style={{ fontSize: 14, color: 'var(--text-secondary)', lineHeight: 1.55 }}>Roll dice, claim cities, and flip your rivals' holdings for profit. Passing GO pays out $200 — don't land in Prison.</span>
            </div>
            <div className="type-row">
              <span className="type-spec">Mono num · 18</span>
              <span style={{ fontFamily: 'var(--font-mono)', fontSize: 18, fontWeight: 600 }}>$1,480 &nbsp; · &nbsp; +$200 &nbsp; · &nbsp; −$85</span>
            </div>
            <div className="type-row">
              <span className="type-spec">Label · 10 / 0.12em</span>
              <span style={{ fontFamily: 'var(--font-mono)', fontSize: 10, textTransform: 'uppercase', letterSpacing: '0.12em', color: 'var(--text-muted)' }}>Turn 14 · passing by</span>
            </div>
          </div>
        </section>

        {/* 03 Spacing & Radii */}
        <section className="ds-section">
          <div className="ds-section-head">
            <span className="ds-section-num">03</span>
            <h2 className="ds-section-title">Spacing, radii & elevation</h2>
            <span className="ds-section-sub">4px base · 7 stops · 4 shadows</span>
          </div>

          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 24 }}>
            <div className="ds-card">
              <div className="ds-label">Spacing scale</div>
              <div style={{ display: 'flex', alignItems: 'flex-end', gap: 10, paddingTop: 12 }}>
                {[4, 8, 12, 16, 24, 32, 48, 64].map(n => (
                  <div key={n} style={{ textAlign: 'center' }}>
                    <div className="spacing-block" style={{ width: n, background: `oklch(0.82 0.17 ${200 + n * 2})` }}/>
                    <div style={{ fontFamily: 'var(--font-mono)', fontSize: 10, color: 'var(--text-muted)', marginTop: 6 }}>{n}</div>
                  </div>
                ))}
              </div>
            </div>
            <div className="ds-card">
              <div className="ds-label">Radii</div>
              <div style={{ display: 'flex', gap: 12, flexWrap: 'wrap' }}>
                {[{n:'xs',v:4},{n:'sm',v:6},{n:'md',v:10},{n:'lg',v:14},{n:'xl',v:20},{n:'2xl',v:28}].map(r => (
                  <div key={r.n} className="radius-block" style={{ borderRadius: r.v }}>{r.n} · {r.v}</div>
                ))}
              </div>
            </div>
          </div>

          <div className="ds-card" style={{ marginTop: 24 }}>
            <div className="ds-label">Neon glows — used for active player, winning prompt, selected tile</div>
            <div style={{ display: 'flex', gap: 20, flexWrap: 'wrap', paddingTop: 8 }}>
              {['cyan','magenta','lime','amber'].map(c => (
                <div key={c} style={{ width: 120, height: 80, borderRadius: 12, background: 'var(--bg-raised)', border: '1px solid var(--stroke-soft)', boxShadow: `var(--glow-${c})`, display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 10 }}>
                  <PlayerToken color={c} size={28}/>
                  <span style={{ fontFamily: 'var(--font-mono)', fontSize: 10, color: 'var(--text-secondary)', textTransform: 'uppercase', letterSpacing: '0.1em' }}>{c}</span>
                </div>
              ))}
            </div>
          </div>
        </section>

        {/* 04 Components */}
        <section className="ds-section">
          <div className="ds-section-head">
            <span className="ds-section-num">04</span>
            <h2 className="ds-section-title">Components</h2>
            <span className="ds-section-sub">Tokens · Tiles · Dice · Panels</span>
          </div>

          {/* Player tokens */}
          <div className="ds-card" style={{ marginBottom: 18 }}>
            <div className="ds-label">Player tokens — smiley orbs with neon aura</div>
            <div className="demo-block">
              {['cyan','magenta','lime','amber'].map(c => (
                <div key={c} style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 6 }}>
                  <PlayerToken color={c} size={56}/>
                  <span style={{ fontFamily: 'var(--font-mono)', fontSize: 10, color: 'var(--text-muted)', textTransform: 'uppercase', letterSpacing: '0.08em' }}>{c}</span>
                </div>
              ))}
            </div>
          </div>

          {/* Dice */}
          <div className="ds-card" style={{ marginBottom: 18 }}>
            <div className="ds-label">Dice faces — ivory with soft drop shadow</div>
            <div className="demo-block">
              {[1,2,3,4,5,6].map(n => <DieFace key={n} n={n} size={56}/>)}
            </div>
          </div>

          {/* Tile variants */}
          <div className="ds-card" style={{ marginBottom: 18 }}>
            <div className="ds-label">Board tiles · 7 variants</div>
            <div className="demo-block">
              <TileCard tile={BOARD_TILES[39]} />
              <TileCard tile={BOARD_TILES[39]} owner="cyan" tier={3} />
              <TileCard tile={BOARD_TILES[9]} owner="magenta" tier={5} />
              <TileCard tile={BOARD_TILES[5]} />
              <TileCard tile={BOARD_TILES[12]} />
              <TileCard tile={BOARD_TILES[2]} />
              <TileCard tile={BOARD_TILES[7]} />
              <TileCard tile={BOARD_TILES[4]} />
            </div>
          </div>

          {/* Player cards */}
          <div className="ds-card" style={{ marginBottom: 18 }}>
            <div className="ds-label">Player card — lobby/HUD sidebar</div>
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10, paddingTop: 8 }}>
              <PlayerCard color="magenta" name="Zenith" balance={2480} netWorth={3120} isTurn={true} isYou={false} />
              <PlayerCard color="cyan" name="Homelander" balance={1580} netWorth={2740} isTurn={false} isYou={true} />
              <PlayerCard color="lime" name="Yeppy" balance={1120} netWorth={1980} isTurn={false} isYou={false} />
              <PlayerCard color="amber" name="Notable" balance={840} netWorth={1340} isTurn={false} isYou={false} />
            </div>
          </div>

          {/* Buttons */}
          <div className="ds-card" style={{ marginBottom: 18 }}>
            <div className="ds-label">Buttons — primary, secondary, ghost, danger</div>
            <div className="demo-block" style={{ justifyContent: 'flex-start' }}>
              <Button variant="primary" icon="dice">Roll dice</Button>
              <Button variant="primary" color="var(--neon-lime)" icon="coin">Buy · $280</Button>
              <Button variant="secondary" icon="arrow">End turn</Button>
              <Button variant="ghost">Mortgage</Button>
              <Button variant="danger" icon="x">Forfeit</Button>
              <Button variant="primary" size="sm">sm</Button>
              <Button variant="primary" size="lg" icon="plus">Create game</Button>
            </div>
          </div>

          {/* Chips */}
          <div className="ds-card" style={{ marginBottom: 18 }}>
            <div className="ds-label">Chips & status pills</div>
            <div className="demo-block" style={{ justifyContent: 'flex-start' }}>
              <Chip color="cyan">Your turn</Chip>
              <Chip color="magenta">+$200 salary</Chip>
              <Chip color="lime">Full set · 2x rent</Chip>
              <Chip color="amber">Prison · 2 turns</Chip>
              <Chip color="rose">Bankrupt</Chip>
            </div>
          </div>

          {/* Flag chips */}
          <div className="ds-card" style={{ marginBottom: 18 }}>
            <div className="ds-label">Flag chips — simplified for 18×13 use</div>
            <div className="demo-block" style={{ justifyContent: 'flex-start', gap: 10 }}>
              {Object.keys(FLAGS).map(code => (
                <div key={code} style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 4 }}>
                  <FlagChip code={code} size={22} />
                  <span style={{ fontFamily: 'var(--font-mono)', fontSize: 9, color: 'var(--text-muted)' }}>{code}</span>
                </div>
              ))}
            </div>
          </div>

          {/* Glass panel + icons */}
          <div style={{ display: 'grid', gridTemplateColumns: '2fr 1fr', gap: 18 }}>
            <div className="ds-card">
              <div className="ds-label">Iconography — 1.5px stroke, rounded caps</div>
              <div className="demo-block" style={{ justifyContent: 'flex-start', gap: 18 }}>
                {['dice','chat','settings','copy','send','volume','users','lock','bot','map','home','plus','arrow','question','airplane','bolt','drop','treasure','scale','ban','palm','check','x','crown','star','trend','coin'].map(n => (
                  <div key={n} style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 6, width: 56 }}>
                    <Icon name={n} size={22} color="var(--text-secondary)"/>
                    <span style={{ fontFamily: 'var(--font-mono)', fontSize: 9, color: 'var(--text-muted)' }}>{n}</span>
                  </div>
                ))}
              </div>
            </div>
            <div className="ds-card">
              <div className="ds-label">Glass panel</div>
              <GlassPanel style={{ marginTop: 8 }}>
                <div style={{ fontFamily: 'var(--font-display)', fontWeight: 600, fontSize: 16, marginBottom: 4 }}>Passing by</div>
                <div style={{ fontSize: 12, color: 'var(--text-secondary)', lineHeight: 1.5 }}>Tokyo is owned by Zenith · rent <span style={{ color: 'var(--neon-magenta)', fontFamily: 'var(--font-mono)', fontWeight: 600 }}>$48</span></div>
              </GlassPanel>
            </div>
          </div>
        </section>

        {/* 05 Brand principles */}
        <section className="ds-section">
          <div className="ds-section-head">
            <span className="ds-section-num">05</span>
            <h2 className="ds-section-title">Brand principles</h2>
          </div>
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 16 }}>
            {[
              { t: 'Tactile, not cartoon', d: 'Surfaces feel like glass over charcoal. Depth through blur and hairline strokes — never painterly.' },
              { t: 'Numbers are the hero', d: 'Money, positions, rents, turns. Mono type gives them weight and makes them scannable mid-roll.' },
              { t: 'Neon earns its place', d: 'Glow only for the active player, winning moves, or landed tile. Everywhere else, restraint.' }
            ].map((p, i) => (
              <div key={i} className="ds-card">
                <div style={{ fontFamily: 'var(--font-display)', fontWeight: 600, fontSize: 18, letterSpacing: '-0.02em', marginBottom: 8 }}>{p.t}</div>
                <div style={{ fontSize: 13, color: 'var(--text-secondary)', lineHeight: 1.55 }}>{p.d}</div>
              </div>
            ))}
          </div>
        </section>

        <footer style={{ marginTop: 96, paddingTop: 32, borderTop: '1px solid var(--stroke-hairline)', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
          <TULogo size={28}/>
          <div style={{ display: 'flex', gap: 24, fontFamily: 'var(--font-mono)', fontSize: 11, color: 'var(--text-muted)' }}>
            <a href="prototype.html" style={{ color: 'var(--neon-cyan)', textDecoration: 'none' }}>→ View prototype</a>
            <span>·</span>
            <span>TycoonUP · Neon Boardroom v0.1</span>
          </div>
        </footer>
      </div>
    );

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
